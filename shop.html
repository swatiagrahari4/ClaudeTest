<!DOCTYPE html>
<head>
    <title>F1 Authentics Shop</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #15151e;
            color: white;
            margin: 0;
            padding: 40px;
        }

        h1 {
            text-align: center;
            border-bottom: 3px solid #e10600;
            padding-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 40px auto;
        }

        .card {
            background-color: #1f1f27;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            border: 1px solid #38383f;
            transition: transform 0.2s;
        }

        .card:hover {
            transform: scale(1.03);
            border-color: #e10600;
        }

        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 5px;
            background-color: #2b2b35;
        }

        /* Link Styling: No blue, no underline */
        .product-link {
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .product-link h3 {
            margin: 15px 0 10px;
            font-size: 18px;
        }

        .price-tag {
            color: #e10600;
            font-weight: bold;
            font-size: 20px;
            display: block;
            margin-top: 10px;
        }
    </style>
</head>
